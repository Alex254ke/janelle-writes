<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janelle Writes! — Professional Writing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f1923;
  --teal: #2a9d8f;
  --teal-light: #52c4b8;
  --teal-pale: #e0f5f3;
  --cream: #f8faf9;
  --muted: #6b8a8e;
  --border: #cde0dd;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }

.card, .btn, .badge { padding:12px; border-radius:8px; margin:8px 0; }
.btn-primary { background:var(--teal); color:white; border:none; width:100%; padding:14px; font-size:16px; }
.refresh-btn { background:var(--teal-pale); color:var(--teal); border:none; padding:8px 16px; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div id="auth-screen">
  <div style="flex:1; background:#0f1923; color:white; padding:60px; display:flex; flex-direction:column; justify-content:center;">
    <h1 style="font-size:48px; font-family:'Cormorant Garamond',serif;">Janelle <span style="color:#52c4b8">Writes!</span></h1>
    <p>Professional Academic Writing Platform</p>
  </div>

  <div style="width:480px; padding:60px; background:white;">
    <h2 id="auth-title">Sign In</h2>
    
    <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:12px; margin:12px 0; border:1px solid #ddd; border-radius:8px;">
    <input type="password" id="login-password" placeholder="Password" style="width:100%; padding:12px; margin:12px 0; border:1px solid #ddd; border-radius:8px;">
    
    <button onclick="doLogin()" style="width:100%; padding:14px; background:var(--teal); color:white; border:none; border-radius:8px; margin-top:12px;">Sign In</button>
    
    <div style="margin-top:20px; font-size:13px; background:#f0f9f7; padding:12px; border-radius:8px;">
      <strong>Demo Accounts:</strong><br>
      Employer: employer@demo.com / demo123<br>
      Writer: writer@demo.com / demo123
    </div>
  </div>
</div>

<div id="app-shell" style="display:none; padding:20px;">
  <h1>Welcome, <span id="user-name"></span>!</h1>
  <button onclick="manualRefresh()" class="refresh-btn">⟳ Refresh Orders</button>
  <div id="main-content" style="margin-top:20px;"></div>
</div>

<script>
// ==================== IN-MEMORY STORAGE (Sandbox Safe) ====================
let currentUser = null;
let users = [
  {email:"employer@demo.com", password:"demo123", name:"Demo Employer", role:"employer"},
  {email:"writer@demo.com", password:"demo123", name:"Demo Writer", role:"writer"}
];
let tasks = [];

let pollingInterval = null;

// ==================== POLLING FOR REAL-TIME ====================
function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => {
    renderAvailableOrders();
  }, 6000);
}

function manualRefresh() {
  renderAvailableOrders();
  notify("🔄 Refreshed");
}

// ==================== AUTH ====================
function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-password').value;
  
  const user = users.find(u => u.email === email && u.password === pass);
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    document.getElementById('user-name').textContent = user.name;
    initApp();
  } else {
    alert("Invalid credentials. Use the demo accounts above.");
  }
}

function initApp() {
  notify(`Welcome, ${currentUser.name}!`);
  if (currentUser.role === 'writer') {
    renderAvailableOrders();
    startPolling();
  } else {
    document.getElementById('main-content').innerHTML = `<p style="padding:40px;text-align:center;">Employer Dashboard Ready</p>`;
  }
}

function renderAvailableOrders() {
  const html = tasks.length ? 
    tasks.map(t => `
      <div class="card" style="border:1px solid var(--teal);">
        <strong>${t.id || 'New Order'}</strong><br>
        ${t.subject || 'Academic Task'}<br>
        <small>Budget: KES ${t.total || '12000'}</small>
      </div>
    `).join('') : 
    `<p style="padding:40px;text-align:center;color:#666;">No available orders yet.<br><small>New orders from employer will appear here automatically.</small></p>`;
  
  document.getElementById('main-content').innerHTML = html;
}

function notify(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f1923;color:white;padding:12px 24px;border-radius:8px;z-index:9999;';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// Initialize
</script>
</body>
</html>
